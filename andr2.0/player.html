<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Max Music · Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px 12px 24px;
        }
        .player-container {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 24px 20px 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 18px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
        }
        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            overflow: hidden;
            background: #eef2ff;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            color: #64748b;
            font-size: 16px;
            font-weight: 500;
        }
        .song-title {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .song-artist {
            font-size: 18px;
            color: #475569;
            margin-bottom: 24px;
            font-weight: 400;
        }
        audio {
            width: 100%;
            margin: 8px 0 16px;
            border-radius: 40px;
        }
        .player-footer {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }
        .lang-indicator {
            text-align: right;
            font-size: 13px;
            margin-bottom: 8px;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="player-container">
    <a href="index.html" class="back-link" id="backLink">← Back to library</a>
    <div class="lang-indicator" id="langIndicator"></div>
    
    <div class="cover-wrapper">
        <img id="coverImage" class="cover-img" src="" alt="cover" style="display: none;" onerror="this.style.display='none'; document.getElementById('coverPlaceholder').style.display='flex';">
        <div id="coverPlaceholder" class="cover-placeholder" style="display: flex;">No cover</div>
    </div>
    
    <div class="song-title" id="songTitle">—</div>
    <div class="song-artist" id="songArtist">—</div>
    
    <audio id="audioPlayer" controls preload="metadata"></audio>
    
    <div class="player-footer" id="footerNote"></div>
</div>

<script>
    (function(){
        "use strict";

        const RAW_BASE_URL = 'https://raw.githubusercontent.com/MexrlDev/Y3ah/refs/heads/main/mp3s/';

        // i18n for player (English, Russian, Spanish)
        const i18n = {
            en: {
                back: '← Back to library',
                noCover: 'No cover',
                footer: 'Streaming from raw source',
                langDisplay: 'Interface: English'
            },
            ru: {
                back: '← Назад в библиотеку',
                noCover: 'Без обложки',
                footer: 'Потоковая передача',
                langDisplay: 'Язык: Русский'
            },
            es: {
                back: '← Volver a la biblioteca',
                noCover: 'Sin portada',
                footer: 'Transmision desde fuente',
                langDisplay: 'Idioma: Espanol'
            }
        };

        // Get URL params
        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Unknown Title';
        const artist = params.get('artist') || 'Unknown Artist';
        const file = params.get('file') || '';
        const cover = params.get('cover') || '';
        let langParam = params.get('lang') || 'en';
        if (!['en', 'ru', 'es'].includes(langParam)) langParam = 'en';

        // DOM
        const backLink = document.getElementById('backLink');
        const langIndicator = document.getElementById('langIndicator');
        const songTitleEl = document.getElementById('songTitle');
        const songArtistEl = document.getElementById('songArtist');
        const coverImg = document.getElementById('coverImage');
        const coverPlaceholder = document.getElementById('coverPlaceholder');
        const audioPlayer = document.getElementById('audioPlayer');
        const footerNote = document.getElementById('footerNote');

        function applyLanguage(lang) {
            const t = i18n[lang];
            backLink.textContent = t.back;
            coverPlaceholder.textContent = t.noCover;
            footerNote.textContent = t.footer;
            langIndicator.textContent = t.langDisplay;
            document.documentElement.lang = lang;
        }

        applyLanguage(langParam);

        songTitleEl.textContent = title;
        songArtistEl.textContent = artist;

        if (file) {
            const audioUrl = RAW_BASE_URL + encodeURIComponent(file);
            audioPlayer.src = audioUrl;
        } else {
            audioPlayer.src = '';
        }

        if (cover) {
            const coverUrl = RAW_BASE_URL + encodeURIComponent(cover);
            coverImg.src = coverUrl;
            coverImg.style.display = 'block';
            coverPlaceholder.style.display = 'none';
        } else {
            coverImg.style.display = 'none';
            coverPlaceholder.style.display = 'flex';
        }

        coverImg.addEventListener('error', function() {
            this.style.display = 'none';
            coverPlaceholder.style.display = 'flex';
        });

        backLink.href = 'index.html';
    })();
</script>
</body>
</html>
