<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#f5f7fa" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>Max Music · Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px 12px 24px;
            transition: background 0.2s, color 0.2s;
        }
        body.dark {
            background: #000000;
            color: #ffffff;
        }
        body.dark .player-container {
            background: #1a1a1a;
            border-color: #333333;
        }
        body.dark .song-title {
            color: #ffffff;
        }
        body.dark .song-artist,
        body.dark .lang-indicator,
        body.dark .player-footer {
            color: #cccccc;
        }
        body.dark .cover-placeholder {
            background: #0a0a0a;
            color: #cccccc;
        }
        body.dark .back-link {
            color: #60a5fa;
        }
        body.dark .theme-toggle-player {
            border-color: #444444;
            color: #ffffff;
            background: #1a1a1a;
        }
        .player-container {
            max-width: 480px;
            margin: 0 auto;
            width: 100%;
            background: white;
            border-radius: 28px;
            padding: 24px 20px 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            border: 1px solid #e2e8f0;
        }
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }
        .back-link {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
        }
        .theme-toggle-player {
            background: transparent;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            color: inherit;
        }
        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            overflow: hidden;
            background: #eef2ff;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        body.dark .cover-wrapper {
            background: #0a0a0a;
            border-color: #333333;
        }
        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f1f5f9;
            color: #64748b;
            font-size: 16px;
            font-weight: 500;
        }
        .song-title {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
            line-height: 1.3;
        }
        .song-artist {
            font-size: 18px;
            color: #475569;
            margin-bottom: 24px;
            font-weight: 400;
        }
        audio {
            width: 100%;
            margin: 8px 0 16px;
            border-radius: 40px;
        }
        .player-footer {
            margin-top: 16px;
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
        }
        .lang-indicator {
            text-align: right;
            font-size: 13px;
            margin-bottom: 8px;
            color: #64748b;
        }
    </style>
</head>
<body class="light">
<div class="player-container">
    <div class="player-header">
        <a href="index.html" class="back-link" id="backLink">← Back to library</a>
        <button class="theme-toggle-player" id="playerThemeToggle">Dark</button>
    </div>
    <div class="lang-indicator" id="langIndicator"></div>
    
    <div class="cover-wrapper">
        <img id="coverImage" class="cover-img" src="" alt="cover" crossorigin="anonymous" style="display: none;" onerror="this.style.display='none'; document.getElementById('coverPlaceholder').style.display='flex';">
        <div id="coverPlaceholder" class="cover-placeholder" style="display: flex;">No cover</div>
    </div>
    
    <div class="song-title" id="songTitle">—</div>
    <div class="song-artist" id="songArtist">—</div>
    
    <audio id="audioPlayer" controls preload="metadata" playsinline crossorigin="anonymous"></audio>
    
    <div class="player-footer" id="footerNote"></div>
</div>

<script>
    (function(){
        "use strict";

        const RAW_BASE_URL = 'https://raw.githubusercontent.com/MexrlDev/Y3ah/refs/heads/main/mp3s/';

        const i18n = {
            en: {
                back: '← Back to library',
                noCover: 'No cover',
                footer: 'Streaming from raw source',
                langDisplay: 'Interface: English',
                themeDark: 'Dark',
                themeLight: 'Light'
            },
            ru: {
                back: '← Назад в библиотеку',
                noCover: 'Без обложки',
                footer: 'Потоковая передача',
                langDisplay: 'Язык: Русский',
                themeDark: 'Тёмная',
                themeLight: 'Светлая'
            },
            es: {
                back: '← Volver a la biblioteca',
                noCover: 'Sin portada',
                footer: 'Transmision desde fuente',
                langDisplay: 'Idioma: Espanol',
                themeDark: 'Oscuro',
                themeLight: 'Claro'
            }
        };

        const params = new URLSearchParams(window.location.search);
        const title = params.get('title') || 'Unknown Title';
        const artist = params.get('artist') || 'Unknown Artist';
        const file = params.get('file') || '';
        const cover = params.get('cover') || '';
        let langParam = params.get('lang') || 'en';
        if (!['en', 'ru', 'es'].includes(langParam)) langParam = 'en';
        const themeParam = params.get('theme') || 'light';

        const body = document.body;
        const backLink = document.getElementById('backLink');
        const langIndicator = document.getElementById('langIndicator');
        const songTitleEl = document.getElementById('songTitle');
        const songArtistEl = document.getElementById('songArtist');
        const coverImg = document.getElementById('coverImage');
        const coverPlaceholder = document.getElementById('coverPlaceholder');
        const audioPlayer = document.getElementById('audioPlayer');
        const footerNote = document.getElementById('footerNote');
        const playerThemeToggle = document.getElementById('playerThemeToggle');

        // Audio error logging (silent – no UI change)
        audioPlayer.addEventListener('error', function(e) {
            console.warn('Audio playback error:', audioPlayer.error);
        });

        function applyTheme(isDark) {
            if (isDark) {
                body.classList.add('dark');
                body.classList.remove('light');
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
            }
            const t = i18n[langParam];
            playerThemeToggle.textContent = isDark ? t.themeLight : t.themeDark;
            localStorage.setItem('max-music-theme', isDark ? 'dark' : 'light');
        }

        function initTheme() {
            const saved = localStorage.getItem('max-music-theme');
            if (saved) {
                applyTheme(saved === 'dark');
            } else if (themeParam) {
                applyTheme(themeParam === 'dark');
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                applyTheme(prefersDark);
            }
        }

        function applyLanguage(lang) {
            const t = i18n[lang];
            backLink.textContent = t.back;
            coverPlaceholder.textContent = t.noCover;
            footerNote.textContent = t.footer;
            langIndicator.textContent = t.langDisplay;
            document.documentElement.lang = lang;
            const isDark = body.classList.contains('dark');
            playerThemeToggle.textContent = isDark ? t.themeLight : t.themeDark;
        }

        applyLanguage(langParam);
        initTheme();

        songTitleEl.textContent = title;
        songArtistEl.textContent = artist;

        if (file) {
            // Ensure correct URL encoding (once)
            audioPlayer.src = RAW_BASE_URL + encodeURIComponent(file);
        }

        if (cover) {
            coverImg.src = RAW_BASE_URL + encodeURIComponent(cover);
            coverImg.style.display = 'block';
            coverPlaceholder.style.display = 'none';
        } else {
            coverImg.style.display = 'none';
            coverPlaceholder.style.display = 'flex';
        }

        coverImg.addEventListener('error', function() {
            this.style.display = 'none';
            coverPlaceholder.style.display = 'flex';
        });

        backLink.href = 'index.html';

        playerThemeToggle.addEventListener('click', () => {
            const isDark = body.classList.contains('dark');
            applyTheme(!isDark);
        });

        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('max-music-theme')) {
                applyTheme(e.matches);
            }
        });
    })();
</script>
</body>
</html>
