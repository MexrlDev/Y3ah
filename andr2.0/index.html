<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Max Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
            padding: 16px 12px 24px;
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }
        body.dark {
            background: #000000;
            color: #ffffff;
        }
        body.dark .header h1,
        body.dark .song-title,
        body.dark .action-btn {
            color: #ffffff;
        }
        body.dark .header p,
        body.dark .song-artist,
        body.dark .footer,
        body.dark .status-message {
            color: #cccccc;
        }
        body.dark .song-card,
        body.dark .lang-btn,
        body.dark .theme-btn,
        body.dark .reset-btn,
        body.dark .tools-btn,
        body.dark .action-btn {
            background: #1a1a1a;
            border-color: #333333;
            color: #ffffff;
        }
        body.dark .play-btn {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }
        body.dark .status-message {
            background: #1a1a1a;
            color: #dddddd;
        }
        body.dark .status-message.error {
            background: #330000;
            color: #ffaaaa;
        }
        body.dark .status-message.success {
            background: #003300;
            color: #aaffaa;
        }
        body.dark .cover-thumb {
            background: #333333;
        }
        .header {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .header-titles {
            flex: 1;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: -0.5px;
        }
        .header p {
            font-size: 14px;
            color: #64748b;
            margin-top: 4px;
        }
        .top-actions {
            display: flex;
            gap: 8px;
            margin-left: 12px;
            flex-wrap: wrap;
        }
        .lang-btn, .theme-btn, .reset-btn, .tools-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .tools-btn {
            background: #f8fafc;
            font-size: 18px;
            padding: 8px 14px;
        }
        .reset-btn {
            background: #fee2e2;
            border-color: #fecaca;
            color: #991b1b;
        }
        body.dark .reset-btn {
            background: #330000;
            border-color: #550000;
            color: #ff9999;
        }
        .lang-btn:active, .theme-btn:active, .reset-btn:active, .tools-btn:active {
            background: #f1f5f9;
        }
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .song-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .song-info {
            flex: 1;
            min-width: 140px;
        }
        .song-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: #0f172a;
        }
        .song-artist {
            font-size: 14px;
            color: #64748b;
        }
        .song-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
            text-align: center;
            color: #1e293b;
        }
        .play-btn {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 2px 4px rgba(59,130,246,0.2);
        }
        .play-btn:active {
            background: #2563eb;
            transform: scale(0.96);
        }
        .download-btn {
            background: white;
            border-color: #cbd5e1;
        }
        .download-btn:active {
            background: #f8fafc;
            transform: scale(0.96);
        }
        .download-btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }
        .status-message {
            margin-bottom: 18px;
            padding: 10px 14px;
            border-radius: 40px;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 14px;
            text-align: center;
            transition: background 0.2s, color 0.2s;
        }
        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-message.success {
            background: #dcfce7;
            color: #166534;
        }
        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .cover-thumb {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 12px;
            background: #e2e8f0;
        }
        .song-card-left {
            display: flex;
            align-items: center;
            flex: 2;
        }
    </style>
</head>
<body class="light">
<div class="header">
    <div class="header-titles">
        <h1 id="mainTitle">Max Music</h1>
        <p id="mainSub">Your offline music library</p>
    </div>
    <div class="top-actions">
        <a href="tools/toolset.html" class="tools-btn" title="Tools">🔧</a>
        <button class="theme-btn" id="themeToggle" aria-label="Dark mode">Dark</button>
        <button class="lang-btn" id="langToggle">RU</button>
        <button class="reset-btn" id="resetBtn" title="Clear all data and restart">Reset</button>
    </div>
</div>

<div id="status" class="status-message">
    Loading catalog...
</div>

<div class="song-list" id="songList"></div>

<div class="footer" id="footerText">
    Tap play to listen, download to save offline
</div>

<script>
    (function(){
        "use strict";

        // ---------- CONFIG ----------
        var RAW_BASE_URL = 'https://raw.githubusercontent.com/MexrlDev/Y3ah/refs/heads/main/mp3s/';
        
        var SONGS = [
            {
                id: "song1",
                title: "She's a Big Boy",
                artist: "Artist Name",
                filename: "She_s_a_big_boy.mp3",
                cover: "IMG_7315.jpg"
            },
            {
                id: "song2",
                title: "Последний танец",
                artist: null,
                filename: "Last_dance.mp3",
                cover: ""
            },
            {
                id: "song3",
                title: "Тесак",
                artist: "Savarog 88",
                filename: "Tecak.mp3",
                cover: "Tecak.jpg",
                note: "Thats my fav song!!"
            }
        ];

        // ---------- TRANSLATIONS (no emojis) ----------
        var i18n = {
            en: {
                mainTitle: "Max Music",
                mainSub: "Your offline music library",
                statusLoading: "Loading catalog...",
                statusEmpty: "Catalog is empty",
                statusSongs: function(n) { return n + ' song' + (n !== 1 ? 's' : '') + ' available — choose to play or download'; },
                playBtn: "Play",
                downloadBtn: "Download",
                startingDownload: "Preparing download",
                downloadError: "Download did not start? Tap again",
                footer: "Tap play to listen, download to save offline",
                langBtnNext: "RU",
                themeDark: "Dark",
                themeLight: "Light",
                resetBtn: "Reset",
                noCover: "No cover"
            },
            ru: {
                mainTitle: "Max Music",
                mainSub: "Ваша офлайн фонотека",
                statusLoading: "Загрузка каталога...",
                statusEmpty: "Каталог пуст",
                statusSongs: function(n) {
                    if (n % 10 === 1 && n % 100 !== 11) return n + ' песня доступна — выберите';
                    if ([2,3,4].indexOf(n % 10) !== -1 && [12,13,14].indexOf(n % 100) === -1) return n + ' песни доступны — выберите';
                    return n + ' песен доступно — выберите';
                },
                playBtn: "Слушать",
                downloadBtn: "Скачать",
                startingDownload: "Подготовка загрузки",
                downloadError: "Загрузка не началась? Нажмите ещё раз",
                footer: "Нажмите «Слушать» для воспроизведения, «Скачать» для сохранения",
                langBtnNext: "ES",
                themeDark: "Тёмная",
                themeLight: "Светлая",
                resetBtn: "Сброс",
                noCover: "Без обложки"
            },
            es: {
                mainTitle: "Max Music",
                mainSub: "Tu biblioteca musical sin conexion",
                statusLoading: "Cargando catalogo...",
                statusEmpty: "El catalogo esta vacio",
                statusSongs: function(n) { return n + ' cancion' + (n !== 1 ? 'es' : '') + ' disponible — elige reproducir o descargar'; },
                playBtn: "Escuchar",
                downloadBtn: "Descargar",
                startingDownload: "Preparando descarga",
                downloadError: "¿La descarga no inicio? Toca de nuevo",
                footer: "Toca Escuchar para reproducir, Descargar para guardar",
                langBtnNext: "EN",
                themeDark: "Oscuro",
                themeLight: "Claro",
                resetBtn: "Reiniciar",
                noCover: "Sin portada"
            }
        };

        var LANG_ORDER = ['en', 'ru', 'es'];
        var currentLang = 'en';

        // DOM elements
        var statusEl = document.getElementById('status');
        var songListEl = document.getElementById('songList');
        var langToggle = document.getElementById('langToggle');
        var themeToggle = document.getElementById('themeToggle');
        var resetBtn = document.getElementById('resetBtn');
        var mainTitle = document.getElementById('mainTitle');
        var mainSub = document.getElementById('mainSub');
        var footerText = document.getElementById('footerText');
        var body = document.body;

        // ---------- SAFE LOCALSTORAGE ----------
        function storageGet(key) {
            try {
                return localStorage.getItem(key);
            } catch(e) {
                return null;
            }
        }
        function storageSet(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch(e) {
                return false;
            }
        }
        function storageClear() {
            try {
                localStorage.clear();
                sessionStorage.clear();
            } catch(e) {}
        }

        // ---------- DARK MODE (with fallback) ----------
        function applyTheme(isDark) {
            if (isDark) {
                body.classList.add('dark');
                body.classList.remove('light');
                themeToggle.textContent = i18n[currentLang].themeLight;
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                themeToggle.textContent = i18n[currentLang].themeDark;
            }
            storageSet('max-music-theme', isDark ? 'dark' : 'light');
        }

        function initTheme() {
            var saved = storageGet('max-music-theme');
            var prefersDark = false;
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                prefersDark = true;
            }
            var isDark = saved ? saved === 'dark' : prefersDark;
            applyTheme(isDark);
        }

        function toggleTheme() {
            var isDark = body.classList.contains('dark');
            applyTheme(!isDark);
        }

        // ---------- RESET ----------
        function resetAllData() {
            storageClear();
            window.location.reload(true);
        }

        // ---------- HELPERS ----------
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function updateStaticTexts() {
            var t = i18n[currentLang];
            mainTitle.textContent = t.mainTitle;
            mainSub.textContent = t.mainSub;
            footerText.textContent = t.footer;
            langToggle.textContent = t.langBtnNext;
            resetBtn.textContent = t.resetBtn;
            var isDark = body.classList.contains('dark');
            themeToggle.textContent = isDark ? t.themeLight : t.themeDark;
        }

        function setStatusMessage(customKey, isError, isSuccess) {
            var t = i18n[currentLang];
            var message = '';
            if (customKey === 'loading') message = t.statusLoading;
            else if (customKey === 'empty') message = t.statusEmpty;
            else if (customKey === 'songs') message = t.statusSongs(SONGS.length);
            else message = customKey;

            statusEl.textContent = message;
            statusEl.className = 'status-message';
            if (isError) statusEl.classList.add('error');
            if (isSuccess) statusEl.classList.add('success');
        }

        function getCoverUrl(coverFile) {
            if (!coverFile) return null;
            return RAW_BASE_URL + encodeURIComponent(coverFile);
        }

        // Render song cards
        function renderSongs() {
            if (!SONGS.length) {
                songListEl.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8;">' + i18n[currentLang].statusEmpty + '</div>';
                setStatusMessage('empty', false, false);
                return;
            }

            var t = i18n[currentLang];
            var html = '';
            for (var i = 0; i < SONGS.length; i++) {
                var song = SONGS[i];
                var coverUrl = song.cover ? getCoverUrl(song.cover) : null;
                var coverHtml = coverUrl 
                    ? '<img class="cover-thumb" src="' + escapeHtml(coverUrl) + '" alt="cover" loading="lazy" onerror="this.style.display=\'none\'">' 
                    : '<div class="cover-thumb" style="display:flex;align-items:center;justify-content:center;background:#eef2ff;color:#64748b;font-size:12px;">' + t.noCover + '</div>';
                
                html += '<div class="song-card" data-song-id="' + escapeHtml(song.id) + '">' +
                    '<div class="song-card-left">' +
                        coverHtml +
                        '<div class="song-info">' +
                            '<div class="song-title">' + escapeHtml(song.title) + '</div>' +
                            '<div class="song-artist">' + (song.artist ? escapeHtml(song.artist) : '') + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="song-actions">' +
                        '<button class="action-btn play-btn" data-action="play" data-filename="' + escapeHtml(song.filename) + '" data-title="' + escapeHtml(song.title) + '" data-artist="' + escapeHtml(song.artist || '') + '" data-cover="' + escapeHtml(song.cover || '') + '">' + t.playBtn + '</button>' +
                        '<button class="action-btn download-btn" data-action="download" data-filename="' + escapeHtml(song.filename) + '" data-title="' + escapeHtml(song.title) + '">' + t.downloadBtn + '</button>' +
                    '</div>' +
                '</div>';
            }
            songListEl.innerHTML = html;
            setStatusMessage('songs', false, true);
        }

        function attachEvents() {
            var playBtns = document.querySelectorAll('[data-action="play"]');
            for (var i = 0; i < playBtns.length; i++) {
                playBtns[i].addEventListener('click', onPlayClick);
            }
            var downloadBtns = document.querySelectorAll('[data-action="download"]');
            for (var j = 0; j < downloadBtns.length; j++) {
                downloadBtns[j].addEventListener('click', onDownloadClick);
            }
        }

        function onPlayClick(e) {
            var btn = e.currentTarget;
            var filename = btn.getAttribute('data-filename');
            var title = btn.getAttribute('data-title');
            var artist = btn.getAttribute('data-artist');
            var cover = btn.getAttribute('data-cover') || '';
            
            // Build params for URL (keep as fallback)
            var params = [];
            params.push('title=' + encodeURIComponent(title));
            params.push('artist=' + encodeURIComponent(artist));
            params.push('file=' + encodeURIComponent(filename));
            params.push('cover=' + encodeURIComponent(cover));
            params.push('lang=' + encodeURIComponent(currentLang));
            params.push('theme=' + encodeURIComponent(body.classList.contains('dark') ? 'dark' : 'light'));
            var queryString = params.join('&');
            
            // Store in sessionStorage for reliable retrieval in player
            try {
                sessionStorage.setItem('currentSong', JSON.stringify({
                    title: title,
                    artist: artist,
                    file: filename,
                    cover: cover,
                    lang: currentLang,
                    theme: body.classList.contains('dark') ? 'dark' : 'light'
                }));
            } catch(e) { /* ignore */ }
            
            // Navigate to player
            window.location.href = 'player.html?' + queryString;
        }

        function onDownloadClick(e) {
            var btn = e.currentTarget;
            var filename = btn.getAttribute('data-filename');
            var title = btn.getAttribute('data-title');
            var t = i18n[currentLang];

            if (!filename) {
                setStatusMessage('No file specified', true, false);
                return;
            }

            if (btn.disabled) return;
            btn.disabled = true;
            btn.classList.add('loading');
            var originalText = btn.textContent;
            btn.textContent = '...';

            var downloadUrl = RAW_BASE_URL + encodeURIComponent(filename);
            setStatusMessage(t.startingDownload + ': ' + title, false, false);
            window.location.href = downloadUrl;

            setTimeout(function() {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = originalText;
                setStatusMessage(t.downloadError, true, false);
            }, 2800);
        }

        // Language toggle with persistence
        var langSwitchTimer = null;
        function toggleLanguage() {
            if (langSwitchTimer) clearTimeout(langSwitchTimer);
            
            var currentIndex = LANG_ORDER.indexOf(currentLang);
            var nextIndex = (currentIndex + 1) % LANG_ORDER.length;
            currentLang = LANG_ORDER[nextIndex];
            
            storageSet('max-music-lang', currentLang);
            
            updateStaticTexts();
            renderSongs();
            attachEvents();
            
            if (SONGS.length) {
                setStatusMessage('songs', false, true);
            } else {
                setStatusMessage('empty', false, false);
            }
            
            langSwitchTimer = setTimeout(function() { langSwitchTimer = null; }, 150);
        }

        // ---------- INIT ----------
        function init() {
            var savedLang = storageGet('max-music-lang');
            if (savedLang && LANG_ORDER.indexOf(savedLang) !== -1) {
                currentLang = savedLang;
            }
            
            initTheme();
            updateStaticTexts();
            renderSongs();
            attachEvents();
            
            langToggle.addEventListener('click', toggleLanguage);
            themeToggle.addEventListener('click', toggleTheme);
            resetBtn.addEventListener('click', resetAllData);
            
            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                    if (!storageGet('max-music-theme')) {
                        applyTheme(e.matches);
                        updateStaticTexts();
                    }
                });
            }
        }

        init();
    })();
</script>
</body>
</html>
