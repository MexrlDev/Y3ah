<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Max Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            color: #1e293b;
            padding: 16px 12px 24px;
            min-height: 100vh;
        }
        .header {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .header-titles {
            flex: 1;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #0f172a;
            letter-spacing: -0.5px;
        }
        .header p {
            font-size: 14px;
            color: #64748b;
            margin-top: 4px;
        }
        .lang-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            transition: all 0.2s;
            margin-left: 12px;
        }
        .lang-btn:active {
            background: #f1f5f9;
        }
        .song-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .song-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #e2e8f0;
            flex-wrap: wrap;
        }
        .song-info {
            flex: 1;
            min-width: 140px;
        }
        .song-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
            color: #0f172a;
        }
        .song-artist {
            font-size: 14px;
            color: #64748b;
        }
        .song-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .action-btn {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 80px;
            text-align: center;
            color: #1e293b;
        }
        .play-btn {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            box-shadow: 0 2px 4px rgba(59,130,246,0.2);
        }
        .play-btn:active {
            background: #2563eb;
            transform: scale(0.96);
        }
        .download-btn {
            background: white;
            border-color: #cbd5e1;
        }
        .download-btn:active {
            background: #f8fafc;
            transform: scale(0.96);
        }
        .download-btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }
        .status-message {
            margin-bottom: 18px;
            padding: 10px 14px;
            border-radius: 40px;
            background: #e0f2fe;
            color: #0369a1;
            font-size: 14px;
            text-align: center;
            transition: background 0.2s, color 0.2s;
        }
        .status-message.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .status-message.success {
            background: #dcfce7;
            color: #166534;
        }
        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }
        .cover-thumb {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
            margin-right: 12px;
            background: #e2e8f0;
        }
        .song-card-left {
            display: flex;
            align-items: center;
            flex: 2;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-titles">
        <h1 id="mainTitle">Max Music</h1>
        <p id="mainSub">Your offline music library</p>
    </div>
    <button class="lang-btn" id="langToggle">RU</button>
</div>

<div id="status" class="status-message">
    Loading catalog...
</div>

<div class="song-list" id="songList"></div>

<div class="footer" id="footerText">
    Tap play to listen, download to save offline
</div>

<script>
    (function(){
        "use strict";

        // ---------- CONFIG ----------
        const RAW_BASE_URL = 'https://raw.githubusercontent.com/MexrlDev/Y3ah/refs/heads/main/mp3s/';
        
        const SONGS = [
            {
                id: "song1",
                title: "She's a Big Boy",
                artist: "Artist Name",
                filename: "She_s_a_big_boy.mp3",
                cover: "IMG_7315.jpg"
            }
        ];

        // ---------- TRANSLATIONS (no emojis) ----------
        const i18n = {
            en: {
                mainTitle: "Max Music",
                mainSub: "Your offline music library",
                statusLoading: "Loading catalog...",
                statusEmpty: "Catalog is empty",
                statusSongs: (n) => `${n} song${n !== 1 ? 's' : ''} available — choose to play or download`,
                playBtn: "Play",
                downloadBtn: "Download",
                startingDownload: "Preparing download",
                downloadError: "Download did not start? Tap again",
                footer: "Tap play to listen, download to save offline",
                langBtnNext: "RU",      // after EN -> RU
                langBtnCycle: ["RU", "ES", "EN"],
                noCover: "No cover"
            },
            ru: {
                mainTitle: "Max Music",
                mainSub: "Ваша офлайн фонотека",
                statusLoading: "Загрузка каталога...",
                statusEmpty: "Каталог пуст",
                statusSongs: (n) => {
                    if (n % 10 === 1 && n % 100 !== 11) return `${n} песня доступна — выберите`;
                    if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return `${n} песни доступны — выберите`;
                    return `${n} песен доступно — выберите`;
                },
                playBtn: "Слушать",
                downloadBtn: "Скачать",
                startingDownload: "Подготовка загрузки",
                downloadError: "Загрузка не началась? Нажмите ещё раз",
                footer: "Нажмите «Слушать» для воспроизведения, «Скачать» для сохранения",
                langBtnNext: "ES",
                langBtnCycle: ["ES", "EN", "RU"],
                noCover: "Без обложки"
            },
            es: {
                mainTitle: "Max Music",
                mainSub: "Tu biblioteca musical sin conexion",
                statusLoading: "Cargando catalogo...",
                statusEmpty: "El catalogo esta vacio",
                statusSongs: (n) => `${n} cancion${n !== 1 ? 'es' : ''} disponible — elige reproducir o descargar`,
                playBtn: "Escuchar",
                downloadBtn: "Descargar",
                startingDownload: "Preparando descarga",
                downloadError: "¿La descarga no inicio? Toca de nuevo",
                footer: "Toca Escuchar para reproducir, Descargar para guardar",
                langBtnNext: "EN",
                langBtnCycle: ["EN", "RU", "ES"],
                noCover: "Sin portada"
            }
        };

        const LANG_ORDER = ['en', 'ru', 'es'];
        let currentLang = 'en';

        // DOM elements
        const statusEl = document.getElementById('status');
        const songListEl = document.getElementById('songList');
        const langToggle = document.getElementById('langToggle');
        const mainTitle = document.getElementById('mainTitle');
        const mainSub = document.getElementById('mainSub');
        const footerText = document.getElementById('footerText');

        // ---------- HELPERS ----------
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function updateStaticTexts() {
            const t = i18n[currentLang];
            mainTitle.textContent = t.mainTitle;
            mainSub.textContent = t.mainSub;
            footerText.textContent = t.footer;
            // Lang button shows next language code
            langToggle.textContent = t.langBtnNext;
        }

        function setStatusMessage(type, customKey, isError = false, isSuccess = false) {
            const t = i18n[currentLang];
            let message = '';
            if (customKey === 'loading') message = t.statusLoading;
            else if (customKey === 'empty') message = t.statusEmpty;
            else if (customKey === 'songs') message = t.statusSongs(SONGS.length);
            else message = customKey; // raw string

            statusEl.textContent = message;
            statusEl.className = 'status-message';
            if (isError) statusEl.classList.add('error');
            else if (isSuccess) statusEl.classList.add('success');
        }

        function getCoverUrl(coverFile) {
            if (!coverFile) return null;
            return RAW_BASE_URL + encodeURIComponent(coverFile);
        }

        // Render song cards
        function renderSongs() {
            if (!SONGS.length) {
                songListEl.innerHTML = `<div style="text-align:center;padding:20px;color:#94a3b8;">${i18n[currentLang].statusEmpty}</div>`;
                setStatusMessage('info', 'empty');
                return;
            }

            const t = i18n[currentLang];
            let html = '';
            SONGS.forEach(song => {
                const coverUrl = song.cover ? getCoverUrl(song.cover) : null;
                const coverHtml = coverUrl 
                    ? `<img class="cover-thumb" src="${escapeHtml(coverUrl)}" alt="cover" loading="lazy" onerror="this.style.display='none'">` 
                    : `<div class="cover-thumb" style="display:flex;align-items:center;justify-content:center;background:#eef2ff;color:#64748b;font-size:12px;">${t.noCover}</div>`;
                
                html += `
                    <div class="song-card" data-song-id="${escapeHtml(song.id)}">
                        <div class="song-card-left">
                            ${coverHtml}
                            <div class="song-info">
                                <div class="song-title">${escapeHtml(song.title)}</div>
                                <div class="song-artist">${escapeHtml(song.artist)}</div>
                            </div>
                        </div>
                        <div class="song-actions">
                            <button class="action-btn play-btn" data-action="play" data-filename="${escapeHtml(song.filename)}" data-title="${escapeHtml(song.title)}" data-artist="${escapeHtml(song.artist)}" data-cover="${escapeHtml(song.cover || '')}">${t.playBtn}</button>
                            <button class="action-btn download-btn" data-action="download" data-filename="${escapeHtml(song.filename)}" data-title="${escapeHtml(song.title)}">${t.downloadBtn}</button>
                        </div>
                    </div>
                `;
            });
            songListEl.innerHTML = html;
            setStatusMessage('success', 'songs', false, true);
        }

        function attachEvents() {
            document.querySelectorAll('[data-action="play"]').forEach(btn => {
                btn.addEventListener('click', onPlayClick);
            });
            document.querySelectorAll('[data-action="download"]').forEach(btn => {
                btn.addEventListener('click', onDownloadClick);
            });
        }

        function onPlayClick(e) {
            const btn = e.currentTarget;
            const filename = btn.dataset.filename;
            const title = btn.dataset.title;
            const artist = btn.dataset.artist;
            const cover = btn.dataset.cover || '';
            
            const params = new URLSearchParams();
            params.set('title', title);
            params.set('artist', artist);
            params.set('file', filename);
            params.set('cover', cover);
            params.set('lang', currentLang);
            
            const playerUrl = `player.html?${params.toString()}`;
            window.open(playerUrl, '_blank');
        }

        function onDownloadClick(e) {
            const btn = e.currentTarget;
            const filename = btn.dataset.filename;
            const title = btn.dataset.title;
            const t = i18n[currentLang];

            if (!filename) {
                setStatusMessage('error', 'No file specified', true);
                return;
            }

            if (btn.disabled) return;
            btn.disabled = true;
            btn.classList.add('loading');
            const originalText = btn.textContent;
            btn.textContent = '...';

            const downloadUrl = RAW_BASE_URL + encodeURIComponent(filename);
            
            setStatusMessage('info', `${t.startingDownload}: ${title}`);
            
            window.location.href = downloadUrl;

            setTimeout(() => {
                btn.disabled = false;
                btn.classList.remove('loading');
                btn.textContent = originalText;
                setStatusMessage('error', t.downloadError, true);
            }, 2800);
        }

        // Cycle language en -> ru -> es -> en
        function toggleLanguage() {
            const currentIndex = LANG_ORDER.indexOf(currentLang);
            const nextIndex = (currentIndex + 1) % LANG_ORDER.length;
            currentLang = LANG_ORDER[nextIndex];
            
            updateStaticTexts();
            renderSongs();
            attachEvents();
            
            if (SONGS.length) {
                setStatusMessage('success', 'songs', false, true);
            } else {
                setStatusMessage('info', 'empty');
            }
        }

        function init() {
            updateStaticTexts();
            renderSongs();
            attachEvents();
            langToggle.addEventListener('click', toggleLanguage);
        }

        init();
    })();
</script>
</body>
</html>
