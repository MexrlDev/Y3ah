<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOOM · Max Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: fixed;
            inset: 0;
        }
        body.light {
            background: #f5f7fa;
            color: #1e293b;
        }
        .toolbar {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        body.light .toolbar {
            background: white;
            border-bottom-color: #e2e8f0;
        }
        .back-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }
        body.light .back-link {
            color: #3b82f6;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            flex: 1;
        }
        #game-area {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #dosbox-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dosbox-container {
            width: 100% !important;
            height: 100% !important;
        }
        .dosbox-container > .dosbox-overlay {
            background: url(https://js-dos.com/cdn/DOOM.png);
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
            image-rendering: crisp-edges;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px 24px;
            border-radius: 40px;
            font-size: 18px;
            z-index: 100;
            pointer-events: none;
            text-align: center;
        }
        body.light .loading {
            background: rgba(255,255,255,0.9);
            color: black;
            border: 1px solid #ccc;
        }
        .gamepad {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 12px;
            pointer-events: none;
            z-index: 200;
        }
        .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
        }
        .dpad-row {
            display: flex;
            justify-content: center;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
            pointer-events: auto;
        }
        .ctrl-btn {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(4px);
            border: 2px solid #555;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 4px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.05s;
            user-select: none;
        }
        body.light .ctrl-btn {
            background: rgba(240, 240, 240, 0.8);
            border-color: #ccc;
            color: #1e293b;
        }
        .ctrl-btn:active {
            background: #3b82f6;
            border-color: #2563eb;
            transform: scale(0.92);
        }
        .fire-btn {
            background: rgba(180, 30, 30, 0.9);
            border-color: #ff4444;
            width: 70px;
            height: 70px;
            border-radius: 35px;
            font-size: 20px;
        }
        .fire-btn:active {
            background: #ff0000;
        }
        .small-btn {
            width: 50px;
            height: 50px;
            font-size: 18px;
        }
        .hidden {
            display: none !important;
        }
        .fullscreen-btn {
            position: absolute;
            top: 70px;
            right: 12px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: 1px solid #555;
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            z-index: 50;
            pointer-events: auto;
        }
        body.light .fullscreen-btn {
            background: rgba(255,255,255,0.8);
            color: #1e293b;
            border-color: #ccc;
        }
        .hint {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            text-align: center;
            color: #aaa;
            font-size: 12px;
            pointer-events: none;
            z-index: 150;
        }
    </style>
</head>
<body class="dark">
<div class="toolbar">
    <a href="../toolset.html" class="back-link" id="backLink">← Tools</a>
    <h1 id="title">DOOM</h1>
</div>

<div id="game-area">
    <div id="dosbox-container">
        <div id="dosbox"></div>
    </div>
    <div id="loading-message" class="loading">
        <span id="loadingText">Loading DOOM...</span>
    </div>
    
    <button class="fullscreen-btn" id="fullscreenBtn">⛶ Fullscreen</button>
    <div class="hint">Three‑finger tap for keyboard</div>
    
    <div class="gamepad" id="gamepadPanel">
        <div class="dpad">
            <div class="dpad-row">
                <div class="ctrl-btn" data-key="ArrowUp">↑</div>
            </div>
            <div class="dpad-row">
                <div class="ctrl-btn" data-key="ArrowLeft">←</div>
                <div class="ctrl-btn" data-key="ArrowDown">↓</div>
                <div class="ctrl-btn" data-key="ArrowRight">→</div>
            </div>
        </div>
        <div class="action-buttons">
            <div class="ctrl-btn small-btn" data-key="ControlLeft">Ctrl</div>
            <div class="ctrl-btn fire-btn" data-key="Space">⚡</div>
            <div class="ctrl-btn small-btn" data-key="Enter">↵</div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://js-dos.com/cdn/js-dos-api.js"></script>
<script>
    (function() {
        "use strict";

        // Storage helpers
        function storageGet(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        }

        var savedLang = storageGet('max-music-lang') || 'en';
        var savedTheme = storageGet('max-music-theme') || 'dark';
        var lang = (['en','ru','es'].indexOf(savedLang) !== -1) ? savedLang : 'en';

        if (savedTheme === 'light') {
            document.body.classList.add('light');
            document.body.classList.remove('dark');
        }

        var i18n = {
            en: { back: '← Tools', title: 'DOOM', loading: 'Loading DOOM...', fullscreen: '⛶ Fullscreen' },
            ru: { back: '← Инструменты', title: 'DOOM', loading: 'Загрузка DOOM...', fullscreen: '⛶ На весь экран' },
            es: { back: '← Herramientas', title: 'DOOM', loading: 'Cargando DOOM...', fullscreen: '⛶ Pantalla completa' }
        };
        document.getElementById('backLink').textContent = i18n[lang].back;
        document.getElementById('title').textContent = i18n[lang].title;
        document.getElementById('loadingText').textContent = i18n[lang].loading;
        document.getElementById('fullscreenBtn').textContent = i18n[lang].fullscreen;

        var loadingEl = document.getElementById('loading-message');
        var gamepadPanel = document.getElementById('gamepadPanel');
        var dosboxInstance = null;

        // Absolute URL to DOOM shareware bundle (works from any origin)
        // This is the same file used by the original example, but served from an absolute path.
        var DOOM_ZIP = 'https://js-dos.com/cdn/DOOM-@evilution.zip';

        // Fallback: if custom zip provided via ?zip=...
        var params = new URLSearchParams(window.location.search);
        var customZip = params.get('zip');
        if (customZip) DOOM_ZIP = customZip;

        // Initialize Dosbox exactly as in the working example
        function initDosbox() {
            if (typeof Dosbox === 'undefined') {
                document.getElementById('loadingText').textContent = 'js-dos API failed to load';
                return;
            }

            dosboxInstance = new Dosbox({
                id: "dosbox",
                onload: function(dosbox) {
                    loadingEl.style.display = 'none';
                    gamepadPanel.classList.remove('hidden');
                    // Run DOOM with the absolute ZIP URL
                    dosbox.run(DOOM_ZIP, "./doom");
                },
                onrun: function(dosbox, app) {
                    console.log("App '" + app + "' is running");
                }
            });
        }

        // Fullscreen button
        document.getElementById('fullscreenBtn').addEventListener('click', function() {
            if (dosboxInstance && dosboxInstance.requestFullScreen) {
                dosboxInstance.requestFullScreen();
            } else {
                var el = document.getElementById('dosbox-container');
                if (el.requestFullscreen) el.requestFullscreen();
            }
        });

        // On‑screen buttons (may not work with old API; fallback is virtual keyboard)
        function sendKey(keyCode) {
            if (!dosboxInstance) return;
            if (dosboxInstance.sendKey) {
                dosboxInstance.sendKey(keyCode);
            } else if (dosboxInstance.sendKeyPress) {
                dosboxInstance.sendKeyPress(keyCode);
            }
            // If no method exists, user should use three‑finger tap.
        }

        function attachControls() {
            var buttons = document.querySelectorAll('[data-key]');
            for (var i = 0; i < buttons.length; i++) {
                var btn = buttons[i];
                btn.addEventListener('touchstart', function(e) {
                    e.preventDefault();
                    var key = this.getAttribute('data-key');
                    sendKey(key);
                    this.style.background = '#3b82f6';
                });
                btn.addEventListener('touchend', function(e) {
                    e.preventDefault();
                    this.style.background = '';
                });
                btn.addEventListener('mousedown', function(e) {
                    e.preventDefault();
                    var key = this.getAttribute('data-key');
                    sendKey(key);
                    this.style.background = '#3b82f6';
                });
                btn.addEventListener('mouseup', function(e) {
                    e.preventDefault();
                    this.style.background = '';
                });
                btn.addEventListener('mouseleave', function() {
                    this.style.background = '';
                });
            }
        }

        // Prevent default touch events on canvas
        var container = document.getElementById('dosbox');
        container.addEventListener('touchstart', function(e) {
            e.preventDefault();
        }, { passive: false });
        container.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Start
        initDosbox();
        attachControls();
    })();
</script>
</body>
</html>
