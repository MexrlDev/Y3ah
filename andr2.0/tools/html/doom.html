<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DOOM - Play in Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            font-family: system-ui, -apple-system, 'Segoe UI', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .top-bar {
            background: #1a1a2e;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 1px solid #333;
        }
        h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .status {
            font-size: 0.8rem;
            color: #88ff88;
        }
        .game-wrapper {
            flex: 1;
            position: relative;
            background: black;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .info {
            text-align: center;
            padding: 8px;
            font-size: 0.75rem;
            color: #aaa;
            background: #111;
            flex-shrink: 0;
        }
        a {
            color: #88aaff;
        }
    </style>
</head>
<body>
<div class="top-bar">
    <h1>🔥 DOOM (1993)</h1>
    <div class="status" id="status">Loading...</div>
</div>
<div class="game-wrapper">
    <!-- 
        Official embed code from DOS.Zone.
        This iframe loads the game from their reliable player,
        no CORS, no local bundle needed.
    -->
    <iframe 
        id="gameFrame"
        src="https://dos.zone/player/?bundleUrl=https://cdn.dos.zone/custom/dos/doom.jsdos&anonymous=1"
        allowfullscreen>
    </iframe>
</div>
<div class="info">
    🎮 Click inside to focus | Fullscreen available | <a href="#" id="reloadLink">Reload game</a>
</div>

<script>
    const iframe = document.getElementById('gameFrame');
    const statusDiv = document.getElementById('status');
    const reloadLink = document.getElementById('reloadLink');

    // Monitor iframe load
    iframe.addEventListener('load', () => {
        statusDiv.innerHTML = '✅ Ready — click to play';
        statusDiv.style.color = '#88ff88';
    });

    iframe.addEventListener('error', () => {
        statusDiv.innerHTML = '❌ Failed to load. Check internet.';
        statusDiv.style.color = '#ff8888';
    });

    // Reload button
    reloadLink.addEventListener('click', (e) => {
        e.preventDefault();
        statusDiv.innerHTML = '🔄 Reloading...';
        iframe.src = iframe.src; // force reload
    });

    // Optional: log any console messages from iframe (can't due to cross-origin, but fine)
    console.log('DOOM launcher ready — using official DOS.Zone embed');
</script>
</body>
</html>
