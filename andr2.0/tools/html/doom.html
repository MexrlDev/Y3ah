<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DOOM · Max Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000000;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        body.light {
            background: #f5f7fa;
            color: #1e293b;
        }
        .toolbar {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        body.light .toolbar {
            background: white;
            border-bottom-color: #e2e8f0;
        }
        .back-link {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }
        body.light .back-link {
            color: #3b82f6;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            flex: 1;
        }
        .hint {
            font-size: 14px;
            opacity: 0.8;
            margin-right: 8px;
        }
        #dos-container {
            flex: 1;
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: crisp-edges; /* pixelated look */
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 16px 24px;
            border-radius: 40px;
            font-size: 18px;
            z-index: 100;
        }
        body.light .loading {
            background: rgba(255,255,255,0.9);
            color: black;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body class="dark">
<div class="toolbar">
    <a href="../toolset.html" class="back-link" id="backLink">← Tools</a>
    <h1 id="title">DOOM (Shareware)</h1>
    <span class="hint">Tap screen for controls</span>
</div>

<div id="dos-container">
    <div id="loading-message" class="loading">Loading DOOM...</div>
</div>

<script>
    (function() {
        // Safe localStorage
        function storageGet(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        }

        // Load preferences for theme and language (minimal)
        var savedLang = storageGet('max-music-lang') || 'en';
        var savedTheme = storageGet('max-music-theme') || 'dark';
        var lang = (['en','ru','es'].indexOf(savedLang) !== -1) ? savedLang : 'en';

        // Apply theme (body is dark by default)
        if (savedTheme === 'light') {
            document.body.classList.add('light');
            document.body.classList.remove('dark');
        }

        // i18n for tiny bits
        var i18n = {
            en: { back: '← Tools', title: 'DOOM (Shareware)', loading: 'Loading DOOM...' },
            ru: { back: '← Инструменты', title: 'DOOM (Shareware)', loading: 'Загрузка DOOM...' },
            es: { back: '← Herramientas', title: 'DOOM (Shareware)', loading: 'Cargando DOOM...' }
        };
        document.getElementById('backLink').textContent = i18n[lang].back;
        document.getElementById('title').textContent = i18n[lang].title;
        document.getElementById('loading-message').textContent = i18n[lang].loading;

        // Load js-dos and run DOOM
        var container = document.getElementById('dos-container');
        var loadingEl = document.getElementById('loading-message');

        // Use js-dos v8 (latest stable) from CDN
        var script = document.createElement('script');
        script.src = 'https://js-dos.com/v8/dist/js-dos.js';
        script.onload = function() {
            // Initialize Dos emulator
            Dos(container, {
                url: 'https://doszone-uploads.s3.eu-central-1.amazonaws.com/doom.jsdos',
                theme: savedTheme === 'light' ? 'light' : 'dark',
                backend: 'webgl',
                autoStart: true,
                noSideBar: true,
                kiosk: true,
            }).then(function(runtime) {
                loadingEl.style.display = 'none';
                // Add touch-friendly hint after load
                setTimeout(function() {
                    var hint = document.createElement('div');
                    hint.style.position = 'absolute';
                    hint.style.bottom = '20px';
                    hint.style.left = '0';
                    hint.style.right = '0';
                    hint.style.textAlign = 'center';
                    hint.style.color = '#aaa';
                    hint.style.fontSize = '12px';
                    hint.style.pointerEvents = 'none';
                    hint.style.textShadow = '1px 1px 2px black';
                    hint.innerText = 'Tap center to fire • Two fingers for strafe • Pinch to zoom?';
                    container.appendChild(hint);
                    setTimeout(function() { hint.style.opacity = '0'; }, 5000);
                }, 2000);
            }).catch(function(err) {
                loadingEl.textContent = 'Failed to load DOOM: ' + err;
            });
        };
        script.onerror = function() {
            loadingEl.textContent = 'Error loading js-dos. Check connection.';
        };
        document.head.appendChild(script);

        // Prevent accidental back gesture on canvas
        container.addEventListener('touchstart', function(e) {
            e.preventDefault();
        }, { passive: false });
    })();
</script>
</body>
</html>
