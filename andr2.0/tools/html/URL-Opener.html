<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>URL Launcher · same UI</title>
  <style>
    /* ----- same base & toolbar (DOOM‑inspired) ----- */
    body {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .toolbar {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      gap: 12px;
    }

    .back {
      color: #60a5fa;
      text-decoration: none;
      font-weight: 500;
      font-size: 16px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      flex: 1;
      letter-spacing: -0.01em;
    }

    /* ----- main container (same spacing) ----- */
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 24px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }

    /* ----- "good type box" – clean, bold, dark input ----- */
    .url-card {
      background: #111111;
      border-radius: 20px;
      padding: 20px 18px;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }

    .input-label {
      display: block;
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 10px;
      color: #bbbbbb;
      letter-spacing: 0.3px;
    }

    .url-input {
      width: 100%;
      padding: 16px 18px;
      font-size: 17px;
      background: #1e1e1e;
      border: 1.5px solid #3a3a3a;
      border-radius: 18px;
      color: #ffffff;
      box-sizing: border-box;
      transition: border 0.15s, background 0.1s;
      font-family: inherit;
      outline: none;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }

    .url-input:focus {
      border-color: #3b82f6;
      background: #1a1a1a;
    }

    .url-input::placeholder {
      color: #6b7280;
      font-weight: 400;
      opacity: 0.8;
    }

    /* ----- button grid (same as original, but we use one main button) ----- */
    .buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    /* two‑column layout if we want extra actions, but we keep single primary */
    .button-row {
      display: grid;
      grid-template-columns: 1fr;
    }

    button {
      padding: 18px 16px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 18px;
      background: #1f1f1f;
      color: white;
      transition: all 0.08s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      border: 1px solid #333;
      letter-spacing: 0.3px;
    }

    /* primary action – blue tint */
    button.primary {
      background: #2563eb;
      border-color: #3b82f6;
      box-shadow: 0 6px 12px rgba(37, 99, 235, 0.2);
    }

    button.primary:active {
      background: #1d4ed8;
      transform: scale(0.97);
      border-color: #60a5fa;
    }

    button:active {
      background: #2d2d2d;
      transform: scale(0.96);
    }

    /* secondary / subtle */
    .hint {
      margin-top: 8px;
      text-align: center;
      font-size: 14px;
      color: #9ca3af;
    }

    .hint kbd {
      background: #262626;
      padding: 3px 8px;
      border-radius: 20px;
      font-family: monospace;
      color: #ddd;
      border: 1px solid #404040;
    }

    /* keep the stop style if we need it, but not used */
    .stop {
      background: #aa2222;
    }

    /* remove vibration leftovers */
    .slider-container, .value, .stop {
      display: none;
    }

    /* make sure everything is smooth */
    .url-card {
      margin-bottom: 8px;
    }

    /* additional polish */
    .footer-note {
      margin-top: auto;
      font-size: 13px;
      color: #5f5f5f;
      text-align: center;
      padding-bottom: 8px;
    }

    /* back arrow hover */
    .back:hover {
      color: #93c5fd;
    }
  </style>
</head>
<body>

<!-- EXACT SAME TOOLBAR structure -->
<div class="toolbar">
  <a href="javascript:history.back()" class="back">← Tools</a>
  <div class="title">URL Launcher</div>
</div>

<!-- MAIN CONTAINER — only contains the "good type box" + open action -->
<div class="container">

  <!-- the "good type box" card – clean, focused -->
  <div class="url-card">
    <label class="input-label" for="urlField">🔗 Enter destination URL</label>
    <input type="text" 
           id="urlField" 
           class="url-input" 
           placeholder="https://example.com" 
           value=""
           autocomplete="off" 
           autocapitalize="none"
           spellcheck="false"
           enterkeyhint="go">
    
    <div class="hint" style="margin-top: 14px; text-align: left;">
      <span style="opacity:0.8;">⏎ press Enter · opens in new tab</span>
    </div>
  </div>

  <!-- button grid (same class as original, but we only need one primary) -->
  <div class="buttons">
    <button class="primary" id="openBtn">🌐 Open in New Tab</button>
  </div>

  <!-- subtle extra: quick example (keeps UI calm) -->
  <div style="display: flex; justify-content: center; gap: 8px; margin-top: 4px;">
    <button style="padding: 10px 18px; font-size: 14px; background: #1a1a1a; border-radius: 40px;" id="exampleBtn">Try example</button>
  </div>

  <!-- tiny footer (like original had space) -->
  <div class="footer-note">
    <span>⬚ secure · opens with noopener</span>
  </div>
</div>

<script>
  (function() {
    "use strict";

    const urlInput = document.getElementById('urlField');
    const openButton = document.getElementById('openBtn');

    // Helper: clean & ensure protocol
    function sanitizeUrl(raw) {
      let trimmed = raw.trim();
      if (!trimmed) return null;

      // If it already has http:// or https://, use as is
      if (/^https?:\/\//i.test(trimmed)) {
        return trimmed;
      }
      
      // If it starts with // (protocol-relative), prepend https:
      if (trimmed.startsWith('//')) {
        return 'https:' + trimmed;
      }

      // If it looks like a domain (contains a dot and no spaces) → add https://
      // Also handle localhost or IP
      if (!trimmed.includes(' ') && (trimmed.includes('.') || trimmed === 'localhost' || /^(\d{1,3}\.){3}\d{1,3}(:\d+)?$/.test(trimmed))) {
        return 'https://' + trimmed;
      }

      // fallback: treat as search? but we want URL — still prepend https
      return 'https://' + trimmed;
    }

    // Core function: open URL in new tab
    function openUrlInNewTab() {
      const rawValue = urlInput.value;
      if (!rawValue.trim()) {
        // subtle feedback (but keep UI clean)
        urlInput.style.borderColor = '#ef4444';
        urlInput.focus();
        setTimeout(() => urlInput.style.borderColor = '#3a3a3a', 300);
        // also set placeholder reminder
        urlInput.placeholder = 'Please enter a URL';
        return;
      }

      const finalUrl = sanitizeUrl(rawValue);
      if (!finalUrl) {
        // edge case
        alert('Please enter a valid web address.');
        return;
      }

      try {
        // open in new tab with security best practice
        const newWindow = window.open(finalUrl, '_blank', 'noopener,noreferrer');
        if (!newWindow) {
          // popup blocked maybe
          alert('Popup blocked? Allow popups for this site or click the link manually.');
        } else {
          // visual feedback: border flash green
          urlInput.style.borderColor = '#22c55e';
          setTimeout(() => urlInput.style.borderColor = '#3a3a3a', 400);
          // reset placeholder if it was changed
          urlInput.placeholder = 'https://example.com';
        }
      } catch (e) {
        alert('Could not open URL. Check the address.');
      }
    }

    // ----- Event listeners -----
    openButton.addEventListener('click', openUrlInNewTab);

    // Enter key in input field
    urlInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();   // avoid any form weirdness
        openUrlInNewTab();
      }
    });

    // Reset placeholder on focus if it was showing error
    urlInput.addEventListener('focus', () => {
      if (urlInput.placeholder === 'Please enter a URL') {
        urlInput.placeholder = 'https://example.com';
      }
      urlInput.style.borderColor = '#3a3a3a';
    });

    // Example button: fill a demo URL (doesn't open automatically, just prefills)
    const exampleBtn = document.getElementById('exampleBtn');
    if (exampleBtn) {
      exampleBtn.addEventListener('click', () => {
        urlInput.value = 'github.com';
        urlInput.focus();
        urlInput.select();
        // also flash border
        urlInput.style.borderColor = '#60a5fa';
        setTimeout(() => urlInput.style.borderColor = '#3a3a3a', 400);
      });
    }

    // Also respect "back" link behaviour (already there)
    // Keep original toolbar style & behaviour.

    // (Optional) small polish: mimic original vibration placeholder 
    // but we keep everything clean.
    
    // If user pastes, we can keep border neutral
    urlInput.addEventListener('input', () => {
      urlInput.style.borderColor = '#3a3a3a';
    });

    // Prefill a friendly default on page load? (optional, but keep empty for minimal)
    // Let's set a subtle placeholder, but not force value.
    // We can prefill with nothing, it's fine.
    
    // Add a tiny extra: double-tap on toolbar doesn't do weird things.
    console.log('✓ URL Launcher — same UI, just a good type box.');
  })();
</script>

<!-- ensure no vibration leftovers are visible -->
<style>
  /* hide anything from old vibration UI that might be lingering (we already removed markup) */
  .slider-container, #intensity, .value, .stop, [onclick*="vibrate"] {
    display: none;
  }
  /* keep button styles intact */
  .buttons {
    display: grid;
    grid-template-columns: 1fr;
  }
  /* The "good type box" is the centerpiece */
  .url-card {
    transition: box-shadow 0.2s;
  }
  .url-card:focus-within {
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
    border-color: #3b82f6;
  }
  /* also make the example button consistent */
  #exampleBtn {
    background: #262626;
    border: 1px solid #3f3f3f;
    color: #ccc;
  }
  #exampleBtn:active {
    background: #3b3b3b;
    transform: scale(0.96);
  }
</style>

</body>
</html>
